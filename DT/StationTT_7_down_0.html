<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta http-equiv="content-type" charset="UTF-8">
		<title>東急田園都市線 駅時刻表</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
		<style>
			.time_table
			{  
				font-family: "Noto Sans JP", sans-serif;
  				font-size: 25px;
				display:none;
			}

			.TT_index
			{
				position:fixed;
				top: 70px;
				background-color:#ffffff; 
				width: 100%;
				height: 144px; 
				z-index:999;
			}

			.station_name
			{  
				font-size: 45px; 
				padding: 0px 7px;
				height: 68px;
				font-weight: bold;
			}
			.line_name
			{  
				padding: 0px 7px;
				height: 38px;
			}

			.direc
			{  
				height: 38px;
			}

			.dia_sel
			{
				height: 70px;
				width: 100%;
				text-align: center;
				border-collapse: collapse;
				border-bottom: 5px solid #62AF75;
				background-color:#ffffff; 
			}

			.dia_sel_on
			{
				width: 150px;
				border-top: 1px solid #b4b4b4;
				border-left: 1px solid #b4b4b4;
				border-right: 1px solid #b4b4b4;
				background-color:#62AF75; 
				color: #ffffff;
			}

			.dia_sel_off
			{
				width: 150px;
				border-top: 1px solid #b4b4b4;
				border-left: 1px solid #b4b4b4;
				border-right: 1px solid #b4b4b4;
			}

			.TT_index_space
			{
				height: 206px;
			}

			.table_base
			{
				width: 100%; 
				border-collapse: collapse;
			}

			.time_index
			{  
  				font-size: 20px;
				width: 600px;
				height: 50px;
				font-weight: bold;
				color: #525252;
				background-color: #eeeeee;
			}
			.time
			{  
				font-size: 30px;
				width: 120px;
				font-weight: bold;
				border-bottom: 2px solid #b4b4b4;
				cursor: pointer;
			}
			.train_type
			{  
				font-weight: bold;
				cursor: pointer;
			}
			.cars
			{  
				width: 0px;
				color: #707070;
				cursor: pointer;
			}
			.track
			{  
				color: #707070;
				cursor: pointer;
			}
			.track_num
			{  
				color: #ffffff;
				position: relative;
				position: relative;
				top: -4px;
				left: 7px;
			}

			.track_num_back
			{ 
				background-color: #707070;
				width: 30px;
				height: 30px;
				position: relative;
			}

			.track_num_back::after
			{ 
				content: "番線発";
				display: block; 
				width: 100px;
				position: absolute;
				top: -4px;
   				left: 33px;	
			}

			.track_num_back_2
			{ 
				background-color: #707070;
				width: 60px;
				height: 30px;
				position: relative;
			}

			.track_num_back_2::after
			{ 
				content: "番線発";
				display: block; 
				width: 100px;
				position: absolute;
				top: -1px;
   				left: 63px;	
			}

			.track_num_back_3
			{ 
				background-color: #707070;
				width: 90px;
				height: 30px;
				position: relative;
			}

			.track_num_back_3.cars
			{ 
				content: "番線発";
				display: block; 
				width: 100px;
				position: absolute;
				top: -1px;
   				left: 93px;	
			}

			.train_link
			{  
				text-align: right;
			}
			.dest
			{  
				border-bottom: 2px solid #b4b4b4;
				cursor: pointer;
			}

			.sihatu
			{
				background-color: #0BC3B0;
				width: 90px;
				height: 10px;
				font-size: 20px;
				color: #ffffff;
			}

			.TT_menu
			{
				position:fixed;
				top: 0;
				left: 0;
				width: 100%;
				font-size: 30px;
				height: 70px;
				z-index:999;
				background-color:#ffffff; 
			}

			.TT_menu_space
			{
				height: 70px;
			}

			.custom-link 
			{
            	color: #000000;
            	text-decoration: none;
        	}
		</style>
		<link rel="stylesheet" type="text/css" href="common.css">
		<script>
			function ShowTable()
			{
				// URLのパラメータを取得
				const urlParams = new URLSearchParams(window.location.search);
				const select = urlParams.get("sel");

				// 表示
				document.getElementById(select).style.display="block";
			}
		</script>
	</head>
	<body onload='ShowTable()'>
		<div class="TT_menu">
			<a href="TTIndex.html">駅一覧に戻る</a>
		</div>
		<div class="TT_menu_space"></div>
	<br>この時刻表はOuOrario V001.002を使用して生成しています。<a href="https://surugaexpress.web.fc2.com/X7_freeSoft/ouorario/ouorario.html">詳細</a></body>
</html>
